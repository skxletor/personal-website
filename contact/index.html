<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <title>Contact | Justin Richardson</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../imgs/tempfavicon.png">
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=t==='dark'?'#111111':'#F5F5F0';})();</script>
    <script src="../theme.js"></script>
    <script src="../bg-sync.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Mobile Safari edge gradients -->
    <div class="safari-grad safari-grad-top"></div>

    <header id="header">
        <span>Justin Richardson</span>
        <nav id="nav">
            <a href="../home/">Home</a>
            <a href="../projects/">Projects</a>
            <a href="../personal/">Partner Login</a>
            <a href="../contact/">Contact</a>
        </nav>
    </header>

    <main class="contact-page">
        <div class="contact-inner">

            <span class="section-label">Contact</span>
            <h1 class="contact-name">Justin Richardson</h1>

            <div class="contact-edu">
                <p>Bachelor of Science in Mechanical Engineering &middot; Georgia Institute of Technology Expected Graduation 2029</p>
            </div>

            <div class="contact-links">
                <button class="contact-email" onclick="copyEmail(this, 'personal')">
                    <span class="contact-email-prefix">personal</span>
                    <span class="contact-email-text">jr01[at]outlook.com</span>
                    <span class="contact-email-copied">copied!</span>
                </button>
                <button class="contact-email" onclick="copyEmail(this, 'school')">
                    <span class="contact-email-prefix">school</span>
                    <span class="contact-email-text">jrichardson330[at]gatech.edu</span>
                    <span class="contact-email-copied">copied!</span>
                </button>
            </div>

            <a class="contact-linkedin" href="https://www.linkedin.com/in/justin-richardson-84366b384/" target="_blank" rel="noopener">
                <svg class="contact-linkedin-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                <span>LinkedIn</span>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <span class="footer-copy">&copy; 2026 Justin Richardson</span>
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/justin-richardson-84366b384/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="../contact/">Contact</a>
        </div>
    </footer>

    <script src="../topo-mesh.js"></script>
    <script>
        function copyEmail(btn, type) {
            const emails = {
                personal: 'jr01' + '@' + 'outlook.com',
                school: 'jrichardson330' + '@' + 'gatech.edu'
            };
            navigator.clipboard.writeText(emails[type]).then(() => {
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            });
        }
    </script>
</body>
</html>
