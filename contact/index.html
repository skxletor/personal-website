<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <title>Contact | Justin Richardson</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../imgs/favicon.png">
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=t==='dark'?'#111111':'#F5F5F0';})();</script>
    <script src="../theme.js"></script>
    <script src="../bg-sync.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Mobile Safari edge gradients -->
    <div class="safari-grad safari-grad-top"></div>

    <header id="header">
        <span>Justin Richardson</span>
        <nav id="nav">
            <a href="../home/">Home</a>
            <a href="../projects/">Projects</a>
            <a href="../personal/">Partner Login</a>
            <a href="../contact/">Contact</a>
            <button id="theme-toggle"></button>
        </nav>
    </header>

    <main class="contact-page">
        <div class="contact-inner">

            <span class="section-label">Contact</span>
            <h1 class="contact-name">Justin Richardson</h1>

            <div class="contact-edu">
                <p>Bachelor of Science in Mechanical Engineering &middot; Georgia Institute of Technology Expected Graduation 2029</p>
            </div>

            <div class="contact-links">
                <button class="contact-email" onclick="copyEmail(this)">
                    <span class="contact-email-prefix">personal</span>
                    <span class="contact-email-text">jr01[at]outlook.com</span>
                    <span class="contact-email-copied">copied!</span>
                </button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <span class="footer-copy">&copy; 2026 Justin Richardson</span>
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/justin-richardson-84366b384/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="../contact/">Contact</a>
        </div>
    </footer>

    <script src="../topo-mesh.js"></script>
    <script>
        function copyEmail(btn) {
            const email = 'jr01' + '@' + 'outlook.com';
            navigator.clipboard.writeText(email).then(() => {
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            });
        }
    </script>
</body>
</html>
