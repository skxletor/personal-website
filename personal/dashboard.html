<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F5F5F0">
    <title>Dashboard | Justin Richardson</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../imgs/tempfavicon.png">
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=t==='dark'?'#111111':'#F5F5F0';})();</script>
    <script src="../theme.js"></script>
    <script src="../bg-sync.js"></script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Mobile Safari edge gradients -->
    <div class="safari-grad safari-grad-top"></div>

    <header id="header">
        <span>Justin Richardson</span>
        <nav id="nav">
            <a href="../home/">Home</a>
            <a href="../projects/">Projects</a>
            <a href="../personal/dashboard.html">Dashboard</a>
            <a href="../contact/">Contact</a>
        </nav>
    </header>
    <main class="dashboard-page">
        <div class="dashboard-card">
            <div class="dashboard-header">
                <h2 class="dashboard-title">Dashboard</h2>
                <div class="dashboard-actions">
                    <button id="theme-toggle"></button>
                    <button class="logout-btn" onclick="logout()">Log Out</button>
                </div>
            </div>
            <div class="dashboard-content">
                <p style="color: var(--accent); opacity: 0.6; text-align: center;">Your content goes here.</p>
            </div>
        </div>
    </main>

    <style>
        .dashboard-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .dashboard-card {
            background: transparent;
            border: none;
            border-radius: 12px;
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transform: translateY(-60px);
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dashboard-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dashboard-title {
            font-family: "Space Grotesk", sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
            color: var(--text);
            margin: 0;
            letter-spacing: 0.02em;
        }

        .logout-btn {
            padding: 0.45rem 1rem;
            background: rgba(120, 120, 120, 0.18);
            color: var(--text);
            border: 1px solid rgba(100, 100, 100, 0.5);
            border-radius: 7px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(80, 80, 80, 0.35);
            border-color: var(--accent);
        }

        .dashboard-content {
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 2rem;
            min-height: 300px;
        }
    </style>

    <script>
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '../personal/';
                return;
            }
            const response = await fetch('https://login-node-tcxf.onrender.com/verify', {
                headers: { 'authorization': token }
            });
            if (!response.ok) {
                localStorage.removeItem('token');
                window.location.href = '../personal/';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '../personal/';
        }

        checkAuth();
    </script>
    <script src="../topo-mesh.js"></script>
</body>
</html>
