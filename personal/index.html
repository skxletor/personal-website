<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <title>Personal | Justin Richardson</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../imgs/tempfavicon.png">
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=t==='dark'?'#111111':'#F5F5F0';})();</script>
    <script src="../theme.js"></script>
    <script src="../bg-sync.js"></script>
    <script>
    if (localStorage.getItem('token')) {
        window.location.href = '../personal/dashboard.html';
    }
</script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Mobile Safari edge gradients -->
    <div class="safari-grad safari-grad-top"></div>

    <header id="header">
        <span>Justin Richardson</span>
        <nav id="nav">
            <a href="../home/">Home</a>
            <a href="../projects/">Projects</a>
            <a href="../personal/">Partner Login</a>
            <a href="../contact/">Contact</a>
        </nav>
    </header>
    <main class="login-page">
        <div class="login-card">
            <h2 class="login-title">Partner Login</h2>
            <form class="login-form" onsubmit="return false;">
                <div class="login-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter username">
                </div>
                <div class="login-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter password">
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>
        </div>
    </main>

    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: transparent;
            border: none;
            border-radius: 12px;
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transform: translateY(-125px);
        }

        .login-title {
            font-family: "Space Grotesk", sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
            color: var(--text);
            margin: 0;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .login-field label {
            font-family: "Space Grotesk", sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .login-field input {
            background: var(--bg);
            border: 1px solid var(--card-border);
            border-radius: 7px;
            padding: 0.65rem 0.85rem;
            font-family: "Space Grotesk", sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .login-field input::placeholder {
            color: var(--accent);
            opacity: 0.45;
        }

        .login-field input:focus {
            border-color: var(--card-border-hover);
        }

        .login-btn {
            margin-top: 0.5rem;
            padding: 0.7rem;
            background: rgba(120, 120, 120, 0.18);
            color: var(--text);
            border: 1px solid rgba(100, 100, 100, 0.5);
            border-radius: 7px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .login-btn:hover {
            background: rgba(80, 80, 80, 0.35);
            border-color: var(--accent);
        }
    </style>

    <!-- Footer -->
    <footer class="site-footer">
        <span class="footer-copy">&copy; 2026 Justin Richardson</span>
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/justin-richardson-84366b384/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="../contact/">Contact</a>
        </div>
    </footer>

    <script src="../topo-mesh.js"></script>
    <script>
    document.querySelector('.login-form').addEventListener('submit', async function() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const response = await fetch('https://login-node-tcxf.onrender.com/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('token', data.token);
            window.location.href = '../personal/dashboard.html';
        } else {
            alert('Wrong username or password');
        }
    });
</script>
</body>
</html>
